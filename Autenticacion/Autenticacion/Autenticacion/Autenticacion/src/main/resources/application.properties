spring.application.name=Autenticacion
server.port=8081

# CONFIGURACIÓN DE LA BASE DE DATOS (Adaptable a VS Code y Docker)
# Si corres en VS Code usará localhost:3306 con usuario root y contraseña root.
# Nota: Si usas la base de datos de 'usuario' de tu docker-compose, recuerda cambiar 3306 por 3307.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/db_Autenticacion}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.override-with-generic-response=false
springdoc.swagger-ui.tagsSorter=alpha

eureka.client.enabled=${EUREKA_CLIENT_ENABLED:true}
eureka.client.register-with-eureka=${EUREKA_REGISTER:true}
eureka.client.fetch-registry=${EUREKA_FETCH_REGISTRY:true}
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}